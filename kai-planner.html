<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kai Planner — Parikino Marae</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  :root{
    --plum:#653366;
    --plum-dark:#4a2549;
    --periwinkle:#666698;
    --cream:#faf7f5;
    --ink:#2a1f2b;
    --line:#e7dfe6;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Playfair Display',serif;margin:0;}
  .wrap{max-width:720px;margin:0 auto;padding:32px 20px 80px;}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--periwinkle);font-weight:600;margin-bottom:6px;}
  h1{font-size:28px;color:var(--plum-dark);margin-bottom:4px;}
  .sub{color:#6b5a6b;font-size:14px;margin-bottom:28px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--plum-dark);margin-bottom:6px;}
  select,input[type=number]{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:16px;font-family:inherit;background:#fff;}
  .row{display:flex;gap:12px;}
  .row > div{flex:1;}
  .chip-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .chip{padding:8px 14px;border-radius:999px;border:1px solid var(--line);font-size:13px;cursor:pointer;background:#fff;color:var(--ink);}
  .chip.active{background:var(--plum);border-color:var(--plum);color:#fff;}
  .result-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .result-head h2{font-size:20px;color:var(--plum-dark);}
  .cost{font-size:22px;font-weight:700;color:var(--plum);}
  .cost small{font-size:12px;font-weight:500;color:#8a7a8a;display:block;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8a7a8a;padding:8px 4px;border-bottom:1px solid var(--line);}
  td{padding:10px 4px;border-bottom:1px solid #f1ebf0;}
  .buy-tag{font-size:11px;background:#f3edf3;color:var(--plum-dark);padding:3px 8px;border-radius:6px;display:inline-block;margin-top:2px;}
  .empty{color:#a08fa0;font-size:13px;text-align:center;padding:24px;}
  .footnote{font-size:12px;color:#a08fa0;margin-top:18px;line-height:1.5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

/* ---- Data layer -------------------------------------------------
   Structure mirrors pk_kai_recipes / pk_kai_ingredients / pk_bulk_options
   so this can migrate straight to Supabase later (raw fetch, no supabase-js).
   For now it's seeded locally so the tool works standalone. Edit these
   arrays directly to add/adjust dishes or update NZ supermarket prices. */

const RECIPES = [

      { item: "Kūmara", qty: 0.2, unit: "kg" },
      { item: "Pumpkin", qty: 0.15, unit: "kg" },
      { item: "Cabbage", qty: 0.1, unit: "kg" },
      { item: "Stuffing", qty: 0.08, unit: "kg" },
  ]},
  { id: "boilup", name: "Boil-up", category: "Main", perHead: [
      { item: "Pork bones", qty: 0.3, unit: "kg" },
      { item: "Pūhā or watercress", qty: 0.15, unit: "kg" },
      { item: "Potato", qty: 0.25, unit: "kg" },
      { item: "Kūmara", qty: 0.15, unit: "kg" },
      { item: "Doughboy flour", qty: 0.08, unit: "kg" },
  ]},
  { id: "cornedbeef", name: "Corned Beef & Cabbage", category: "Main", perHead: [

  ]},
  { id: "mince", name: "Mince & Bread", category: "Main", perHead: [

      { item: "Onion", qty: 0.05, unit: "kg" },
  ]},
  { id: "rewena", name: "Rewena Bread", category: "Bread", perHead: [
      { item: "Flour (high grade)", qty: 0.06, unit: "kg" },
      { item: "Rewena bug/starter", qty: 0.01, unit: "kg" },
      { item: "Potato (for bug)", qty: 0.02, unit: "kg" },
  ]},
  { id: "pikelets", name: "Pikelets", category: "Sweet", perHead: [

  ]},
  { id: "morningtea", name: "Morning Tea / Sandwiches", category: "Light", perHead: [

      { item: "Sandwich fillings (ham/cheese/egg mix)", qty: 0.06, unit: "kg" },
      { item: "Butter/margarine", qty: 0.015, unit: "kg" },

  ]},
  { id: "fruitcups", name: "Fruit Cups", category: "Light", perHead: [
      { item: "Mixed fruit (seasonal)", qty: 0.15, unit: "kg" },
      { item: "Clear cups", qty: 1, unit: "each" },
  ]},
  { id: "brownies", name: "Bulk Brownies (make-ahead mix)", category: "Sweet", perHead: [
      { item: "Flour (standard)", qty: 0.0065, unit: "kg" },
      { item: "Cocoa powder", qty: 0.003, unit: "kg" },
      { item: "Sugar (white)", qty: 0.0092, unit: "kg" },
      { item: "Sugar (brown)", qty: 0.0021, unit: "kg" },
      { item: "Baking powder", qty: 0.0005, unit: "kg" },
      { item: "Milk powder", qty: 0.0025, unit: "kg" },
      { item: "Chocolate chips", qty: 0.00375, unit: "kg" },
      { item: "Eggs", qty: 0.125, unit: "each" },
      { item: "Cooking oil", qty: 0.0075, unit: "L" },
  ]},
  { id: "curriedsausage_mash", name: "Curried Sausages + Mash", category: "Main", perHead: [
      { item: "Sausages", qty: 0.2, unit: "kg" },
      { item: "Curry powder", qty: 0.01, unit: "kg" },
      { item: "Onion", qty: 0.05, unit: "kg" },
      { item: "Flour (standard)", qty: 0.01, unit: "kg" },
      { item: "Potato", qty: 0.3, unit: "kg" },
      { item: "Milk", qty: 0.05, unit: "L" },
      { item: "Butter/margarine", qty: 0.01, unit: "kg" },
  ]},
  { id: "curriedsausage_rice", name: "Curried/Devilled Sausages + Rice", category: "Main", perHead: [
      { item: "Sausages", qty: 0.2, unit: "kg" },
      { item: "Curry powder", qty: 0.01, unit: "kg" },
      { item: "Onion", qty: 0.05, unit: "kg" },
      { item: "Flour (standard)", qty: 0.01, unit: "kg" },
      { item: "Rice", qty: 0.1, unit: "kg" },
  ]},
  { id: "focaccia", name: "Focaccia", category: "Bread", perHead: [
      { item: "Flour (high grade)", qty: 0.08, unit: "kg" },
      { item: "Yeast", qty: 0.002, unit: "kg" },
      { item: "Olive oil", qty: 0.02, unit: "L" },
      { item: "Salt", qty: 0.002, unit: "kg" },
  ]},
  { id: "grazingtable", name: "Grazing Table", category: "Light", perHead: [
      { item: "Crackers", qty: 0.05, unit: "kg" },
      { item: "Cheese (mixed)", qty: 0.06, unit: "kg" },
      { item: "Cured meats", qty: 0.05, unit: "kg" },
      { item: "Mixed fruit (seasonal)", qty: 0.08, unit: "kg" },
      { item: "Dips", qty: 0.03, unit: "kg" },
      { item: "Nuts", qty: 0.02, unit: "kg" },
  ]},
];

/* Bulk-buy reference prices — NZ ballpark, edit to match your local
   Costco / PAK'nSAVE / Bin Inn runs. unitPrice = price per kg/L/each/loaf. */
const BULK = {
  "Pork (bone-in, e.g. pork bones/belly)": { store: "Mad Butcher", pack: "5kg", packPrice: 42.5, unitPrice: 8.5, unit: "kg" },
  "Pork bones": { store: "Mad Butcher", pack: "per kg", packPrice: 6, unitPrice: 6, unit: "kg" },
  "Chicken pieces": { store: "Mad Butcher", pack: "10kg box", packPrice: 45, unitPrice: 4.5, unit: "kg" },
  "Potato": { store: "St Hill's (Hill St Greens)", pack: "10kg bag", packPrice: 11, unitPrice: 1.1, unit: "kg" },
  "Kūmara": { store: "St Hill's (Hill St Greens)", pack: "per kg", packPrice: 3.8, unitPrice: 3.8, unit: "kg" },
  "Pumpkin": { store: "St Hill's (Hill St Greens)", pack: "per kg", packPrice: 2.2, unitPrice: 2.2, unit: "kg" },
  "Cabbage": { store: "St Hill's (Hill St Greens)", pack: "whole ~1.5kg", packPrice: 3.5, unitPrice: 2.3, unit: "kg" },
  "Stuffing": { store: "Gilmours", pack: "200g box", packPrice: 2.3, unitPrice: 11.5, unit: "kg" },
  "Pūhā or watercress": { store: "Local/marae garden", pack: "bag", packPrice: 5, unitPrice: 5, unit: "kg" },
  "Doughboy flour": { store: "Gilmours", pack: "20kg bag", packPrice: 27, unitPrice: 1.35, unit: "kg" },
  "Corned beef (silverside)": { store: "Mad Butcher", pack: "5kg", packPrice: 58, unitPrice: 11.6, unit: "kg" },
  "Carrot": { store: "St Hill's (Hill St Greens)", pack: "5kg bag", packPrice: 7, unitPrice: 1.4, unit: "kg" },
  "Beef mince": { store: "Mad Butcher", pack: "5kg", packPrice: 48, unitPrice: 9.6, unit: "kg" },
  "Sliced bread": { store: "Gilmours", pack: "loaf", packPrice: 2.6, unitPrice: 2.6, unit: "loaf" },
  "Onion": { store: "St Hill's (Hill St Greens)", pack: "10kg bag", packPrice: 9, unitPrice: 0.9, unit: "kg" },
  "Flour (high grade)": { store: "Gilmours", pack: "20kg bag", packPrice: 27, unitPrice: 1.35, unit: "kg" },
  "Rewena bug/starter": { store: "Homemade / whānau supply", pack: "n/a", packPrice: 0, unitPrice: 0, unit: "kg" },
  "Potato (for bug)": { store: "St Hill's (Hill St Greens)", pack: "10kg bag", packPrice: 11, unitPrice: 1.1, unit: "kg" },
  "Flour (standard)": { store: "PAK'nSAVE", pack: "1.5kg bag", packPrice: 2.9, unitPrice: 1.93, unit: "kg" },
  "Eggs": { store: "PAK'nSAVE", pack: "dozen", packPrice: 7.8, unitPrice: 0.65, unit: "each" },
  "Milk": { store: "Gilmours", pack: "2L bottle", packPrice: 3.8, unitPrice: 1.9, unit: "L" },
  "Sugar": { store: "Gilmours", pack: "25kg bag", packPrice: 39.99, unitPrice: 1.6, unit: "kg" },
  "Sandwich fillings (ham/cheese/egg mix)": { store: "Mad Butcher / Gilmours", pack: "avg mixed", packPrice: 9.5, unitPrice: 11.5, unit: "kg" },
  "Butter/margarine": { store: "Gilmours", pack: "500g block", packPrice: 4.6, unitPrice: 9.2, unit: "kg" },
  "Tea/coffee": { store: "Gilmours", pack: "per kg", packPrice: 19, unitPrice: 19, unit: "kg" },
  "Milk (for tea)": { store: "Gilmours", pack: "2L bottle", packPrice: 3.8, unitPrice: 1.9, unit: "L" },
  "Mixed fruit (seasonal)": { store: "St Hill's (Hill St Greens)", pack: "per kg", packPrice: 3.8, unitPrice: 3.8, unit: "kg" },
  "Clear cups": { store: "Gilmours", pack: "pack of 100", packPrice: 7.5, unitPrice: 0.075, unit: "each" },
  "Cocoa powder": { store: "PAK'nSAVE", pack: "200g", packPrice: 3.8, unitPrice: 19, unit: "kg" },
  "Sugar (white)": { store: "PAK'nSAVE", pack: "3kg bag", packPrice: 5.5, unitPrice: 1.83, unit: "kg" },
  "Sugar (brown)": { store: "PAK'nSAVE", pack: "1.5kg bag", packPrice: 3.6, unitPrice: 2.4, unit: "kg" },
  "Baking powder": { store: "PAK'nSAVE", pack: "125g", packPrice: 2.6, unitPrice: 20.8, unit: "kg" },
  "Milk powder": { store: "PAK'nSAVE", pack: "1kg", packPrice: 12.5, unitPrice: 12.5, unit: "kg" },
  "Chocolate chips": { store: "PAK'nSAVE", pack: "200g", packPrice: 3.2, unitPrice: 16, unit: "kg" },
  "Cooking oil": { store: "PAK'nSAVE", pack: "2L", packPrice: 6.5, unitPrice: 3.25, unit: "L" },
  "Sausages": { store: "Mad Butcher (community fundraiser rate)", pack: "50-pack", packPrice: 17.5, unitPrice: 0.35, unit: "each", note: "35c each with a fundraiser letter — ask in-store; otherwise ~$9/kg standard" },
  "Curry powder": { store: "Gilmours", pack: "500g tin", packPrice: 8, unitPrice: 16, unit: "kg" },
  "Rice": { store: "Gilmours", pack: "20kg bag", packPrice: 40, unitPrice: 2, unit: "kg" },
  "Yeast": { store: "Gilmours", pack: "500g", packPrice: 9, unitPrice: 18, unit: "kg" },
  "Olive oil": { store: "Gilmours", pack: "4L", packPrice: 28, unitPrice: 7, unit: "L" },
  "Salt": { store: "Gilmours", pack: "1.5kg", packPrice: 3, unitPrice: 2, unit: "kg" },
  "Crackers": { store: "Gilmours", pack: "1kg box", packPrice: 9, unitPrice: 9, unit: "kg" },
  "Cheese (mixed)": { store: "Gilmours", pack: "2kg block", packPrice: 22, unitPrice: 11, unit: "kg" },
  "Cured meats": { store: "Mad Butcher", pack: "per kg", packPrice: 24, unitPrice: 24, unit: "kg" },
  "Dips": { store: "Gilmours", pack: "1kg tub", packPrice: 11, unitPrice: 11, unit: "kg" },
  "Nuts": { store: "Gilmours", pack: "1kg bag", packPrice: 14, unitPrice: 14, unit: "kg" },
};

function KaiPlanner() {
  const [guests, setGuests] = useState(50);
  const [selected, setSelected] = useState(["hangi", "morningtea"]);

  const toggle = (id) => {
    setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  };

  const results = useMemo(() => {
    const rows = [];
    let totalCost = 0;
    selected.forEach(id => {
      const r = RECIPES.find(x => x.id === id);
      if (!r) return;
      r.perHead.forEach(ing => {
        const totalQty = ing.qty * guests;
        const bulk = BULK[ing.item];
        let packsNeeded = null, lineCost = null;
        if (bulk) {
          const packUnitQty = bulk.packPrice / bulk.unitPrice; // qty per pack in native unit
          packsNeeded = Math.ceil(totalQty / packUnitQty) || 0;
          lineCost = packsNeeded * bulk.packPrice;
          totalCost += lineCost;
        }
        rows.push({
          dish: r.name,
          item: ing.item,
          totalQty: totalQty,
          unit: ing.unit,
          bulk,
          packsNeeded,
          lineCost,
        });
      });
    });
    return { rows, totalCost };
  }, [selected, guests]);

  return (
    <div className="wrap">
      <div className="eyebrow">Parikino Marae</div>
      <h1>Kai Planner</h1>
      <div className="sub">Work out exactly how much kai — and how much it'll cost — for your next hui, tangi or wānanga.</div>

      <div className="card">
        <label htmlFor="guests">How many people?</label>
        <input
          id="guests"
          type="number"
          min="1"
          value={guests}
          onChange={e => setGuests(Math.max(1, Number(e.target.value) || 0))}
        />

        <label style={{marginTop:16}}>What are you serving?</label>
        <div className="chip-group">
          {RECIPES.map(r => (
            <div
              key={r.id}
              className={"chip" + (selected.includes(r.id) ? " active" : "")}
              onClick={() => toggle(r.id)}
            >
              {r.name}
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="result-head">
          <h2>Shopping list</h2>
          <div className="cost">
            ${results.totalCost.toFixed(2)}
            <small>estimated total · ${(results.totalCost / guests || 0).toFixed(2)} per head</small>
          </div>
        </div>

        {results.rows.length === 0 ? (
          <div className="empty">Pick at least one dish above to see quantities.</div>
        ) : (
          <table>
            <thead>
              <tr><th>Item</th><th>Need</th><th>Buy</th></tr>
            </thead>
            <tbody>
              {results.rows.map((row, i) => (
                <tr key={i}>
                  <td>
                    {row.item}
                    <div style={{fontSize:11, color:"#a08fa0"}}>{row.dish}</div>
                  </td>
                  <td>{row.totalQty.toFixed(2)} {row.unit}</td>
                  <td>
                    {row.bulk ? (
                      <>
                        {row.packsNeeded}× {row.bulk.pack}
                        <div className="buy-tag">{row.bulk.store} · ${row.lineCost.toFixed(2)}</div>
                        {row.bulk.note && <div style={{fontSize:10.5, color:"#a08fa0", marginTop:2}}>{row.bulk.note}</div>}
                      </>
                    ) : "—"}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
        <div className="footnote">
          Quantities are guidelines based on average marae serving sizes — adjust for known big eaters, kaumātua portions, or if kai's going home with people. Prices are sourced against Gilmours (wholesale pantry/bakery), Mad Butcher (meat), and St Hill's / Hill Street Greens (fresh produce) where public pricing exists, and estimated elsewhere — none of these publish a full live price list online, so confirm current prices in-store or with your rep and update the BULK table in this file as needed.
          <br/><br/>
          Rewena: if there's no active potato bug going, check with kaumātua or whānau first — someone usually has one — otherwise budget 5–7 days to grow a new one before baking.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KaiPlanner />);
</script>
</body>
</html>
