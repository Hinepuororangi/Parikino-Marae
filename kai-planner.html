<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kai Planner — Parikino Marae</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  :root{
    --plum:#653366;
    --plum-dark:#4a2549;
    --periwinkle:#666698;
    --cream:#faf7f5;
    --ink:#2a1f2b;
    --line:#e7dfe6;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Playfair Display',serif;margin:0;}
  .wrap{max-width:720px;margin:0 auto;padding:32px 20px 80px;}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--periwinkle);font-weight:600;margin-bottom:6px;}
  h1{font-size:28px;color:var(--plum-dark);margin-bottom:4px;}
  .sub{color:#6b5a6b;font-size:14px;margin-bottom:28px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--plum-dark);margin-bottom:6px;}
  select,input[type=number]{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:16px;font-family:inherit;background:#fff;}
  .row{display:flex;gap:12px;}
  .row > div{flex:1;}
  .add-row{display:flex;gap:8px;margin-top:6px;}
  .add-row select{flex:1;}
  .btn-add{flex-shrink:0;background:var(--plum);color:#fff;border:none;border-radius:9px;padding:0 18px;font-weight:600;font-size:14px;cursor:pointer;}
  .btn-add:disabled{opacity:.4;cursor:default;}
  .selected-list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
  .selected-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .selected-item-head{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .selected-item-head span{font-weight:600;font-size:14px;color:var(--ink);}
  .selected-item-actions{display:flex;gap:14px;flex-shrink:0;}
  .link-btn{background:none;border:none;color:var(--plum);font-size:12.5px;font-weight:600;cursor:pointer;padding:0;}
  .remove-btn{background:none;border:none;color:#a08fa0;font-size:12.5px;cursor:pointer;padding:0;}
  .method-list{margin:12px 0 0;padding-left:20px;font-size:13px;color:#4a3f4a;line-height:1.6;}
  .method-list li{margin-bottom:6px;}
  .result-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .result-head h2{font-size:20px;color:var(--plum-dark);}
  .cost{font-size:22px;font-weight:700;color:var(--plum);}
  .cost small{font-size:12px;font-weight:500;color:#8a7a8a;display:block;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8a7a8a;padding:8px 4px;border-bottom:1px solid var(--line);}
  td{padding:10px 4px;border-bottom:1px solid #f1ebf0;}
  .buy-tag{font-size:11px;background:#f3edf3;color:var(--plum-dark);padding:3px 8px;border-radius:6px;display:inline-block;margin-top:2px;}
  .empty{color:#a08fa0;font-size:13px;text-align:center;padding:24px;}
  .footnote{font-size:12px;color:#a08fa0;margin-top:18px;line-height:1.5;}
</style>
</head>
<body>
<div id="root"></div>

function KaiPlanner() {
  const [guests, setGuests] = useState(50);
  const [selected, setSelected] = useState(["hangi", "morningtea"]);
  const [pendingDish, setPendingDish] = useState("");
  const [expanded, setExpanded] = useState(null);

  const addDish = () => {
    if (pendingDish && !selected.includes(pendingDish)) {
      setSelected(s => [...s, pendingDish]);
    }
    setPendingDish("");
  };

  const removeDish = (id) => {
    setSelected(s => s.filter(x => x !== id));
    if (expanded === id) setExpanded(null);
  };

  const toggleMethod = (id) => {
    setExpanded(e => e === id ? null : id);
  };

  const results = useMemo(() => {
    const rows = [];
    let totalCost = 0;
    selected.forEach(id => {
      const r = RECIPES.find(x => x.id === id);
      if (!r) return;
      r.perHead.forEach(ing => {
        const totalQty = ing.qty * guests;
        const bulk = BULK[ing.item];
        let packsNeeded = null, lineCost = null;
        if (bulk) {
          const packUnitQty = bulk.packPrice / bulk.unitPrice;
          packsNeeded = Math.ceil(totalQty / packUnitQty) || 0;
          lineCost = packsNeeded * bulk.packPrice;
          totalCost += lineCost;
        }
        rows.push({ dish: r.name, item: ing.item, totalQty, unit: ing.unit, bulk, packsNeeded, lineCost });
      });
    });
    return { rows, totalCost };
  }, [selected, guests]);

  return (
    <div className="wrap">
      <div className="eyebrow">Parikino Marae</div>
      <h1>Kai Planner</h1>
      <div className="sub">Work out exactly how much kai — and how much it'll cost — for your next hui, tangi or wānanga.</div>

      <div className="card">
        <label htmlFor="guests">How many people?</label>
        <input
          id="guests"
          type="number"
          min="1"
          value={guests}
          onChange={e => setGuests(Math.max(1, Number(e.target.value) || 0))}
        />

        <label style={{marginTop:16}}>What are you serving?</label>
        <div className="add-row">
          <select value={pendingDish} onChange={e => setPendingDish(e.target.value)}>
            <option value="">Choose a dish…</option>
            {CATEGORIES.map(cat => (
              <optgroup label={cat} key={cat}>
                {RECIPES.filter(r => r.category === cat).map(r => (
                  <option key={r.id} value={r.id} disabled={selected.includes(r.id)}>{r.name}</option>
                ))}
              </optgroup>
            ))}
          </select>
          <button className="btn-add" onClick={addDish} disabled={!pendingDish}>Add</button>
        </div>

        <div className="selected-list">
          {selected.length === 0 && <div className="empty">No dishes added yet.</div>}
          {selected.map(id => {
            const r = RECIPES.find(x => x.id === id);
            if (!r) return null;
            return (
              <div className="selected-item" key={id}>
                <div className="selected-item-head">
                  <span>{r.name}</span>
                  <div className="selected-item-actions">
                    <button className="link-btn" onClick={() => toggleMethod(id)}>
                      {expanded === id ? "Hide recipe" : "How to"}
                    </button>
                    <button className="remove-btn" onClick={() => removeDish(id)}>Remove</button>
                  </div>
                </div>
                {expanded === id && (
                  <ol className="method-list">
                    {r.method.map((step, i) => <li key={i}>{step}</li>)}
                  </ol>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="result-head">
          <h2>Shopping list</h2>
          <div className="cost">
            ${results.totalCost.toFixed(2)}
            <small>estimated total · ${(results.totalCost / guests || 0).toFixed(2)} per head</small>
          </div>
        </div>

        {results.rows.length === 0 ? (
          <div className="empty">Add at least one dish above to see quantities.</div>
        ) : (
          <table>
            <thead>
              <tr><th>Item</th><th>Need</th><th>Buy</th></tr>
            </thead>
            <tbody>
              {results.rows.map((row, i) => (
                <tr key={i}>
                  <td>
                    {row.item}
                    <div style={{fontSize:11, color:"#a08fa0"}}>{row.dish}</div>
                  </td>
                  <td>{row.totalQty.toFixed(2)} {row.unit}</td>
                  <td>
                    {row.bulk ? (
                      <>
                        {row.packsNeeded}× {row.bulk.pack}
                        <div className="buy-tag">{row.bulk.store} · ${row.lineCost.toFixed(2)}</div>
                        {row.bulk.note && <div style={{fontSize:10.5, color:"#a08fa0", marginTop:2}}>{row.bulk.note}</div>}
                      </>
                    ) : "—"}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
        <div className="footnote">
          Quantities are guidelines based on average marae serving sizes — adjust for known big eaters, kaumātua portions, or if kai's going home with people. Prices are sourced against Gilmours (wholesale pantry/bakery), Mad Butcher (meat), St Hill's / Hill Street Greens (fresh produce), and PAK'nSAVE (retail baking basics) where public pricing exists, and estimated elsewhere — none of these publish a full live price list online, so confirm current prices in-store or with your rep and update the BULK table in this file as needed.
          <br/><br/>
          Rewena: if there's no active potato bug going, check with kaumātua or whānau first — someone usually has one — otherwise budget 5–7 days to grow a new one before baking.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KaiPlanner />);
</script>
</body>
</html>
