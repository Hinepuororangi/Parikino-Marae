<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whānau Check-In — Parikino Marae</title>
<meta name="description" content="Let's reconnect — a quick check-in with Parikino Marae.">
<meta name="theme-color" content="#653366">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --plum:#653366; --plum-dark:#472448; --periwinkle:#666698;
  --paper:#FAF8F6; --paper2:#F0EAEF; --ink:#2B2030; --stone:#7C7284; --line:#E3D9E2;
  --good:#2E7D32;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:480px;margin:0 auto;padding:0 24px;width:100%}
header{padding:28px 0 8px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--periwinkle);text-transform:uppercase}
h1{font-family:'Playfair Display',serif;font-weight:700;font-size:24px;color:var(--plum);margin-top:4px}
.sub{color:var(--stone);font-size:14px;margin-top:6px}
main{flex:1;padding:20px 0 48px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
label{display:block;font-size:12.5px;font-weight:700;color:var(--plum-dark);margin-bottom:8px;line-height:1.4}
input,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:var(--paper);margin-bottom:4px}
input:focus,textarea:focus{outline:none;border-color:var(--periwinkle)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;background:var(--plum);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:15px;cursor:pointer}
.btn:hover{background:var(--plum-dark)}
.btn:disabled{background:var(--stone);cursor:not-allowed}
.choice-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.chip{padding:10px 14px;border:1.5px solid var(--line);border-radius:20px;background:#fff;color:var(--ink);font-family:'Inter',sans-serif;font-size:13.5px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--periwinkle)}
.chip.selected{border-color:var(--plum);background:var(--plum);color:#fff;font-weight:700}
.q{margin-bottom:26px}
.q:last-child{margin-bottom:8px}
.error{color:#B3261E;font-size:13px;margin-top:10px}
.center{text-align:center}
.icon-circle{width:56px;height:56px;border-radius:50%;background:var(--paper2);color:var(--plum);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px}
.thanks h2{font-family:'Playfair Display',serif;font-size:21px;color:var(--plum-dark);margin-bottom:8px}
.thanks p{color:var(--stone);font-size:14px}
.loading{text-align:center;padding:60px 0;color:var(--stone);font-size:14px}
footer{padding:16px 24px 28px;text-align:center;color:var(--stone);font-size:11px}

/* thermometer */
.therm-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:20px}
.therm-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.therm-label .goal{font-size:12.5px;color:var(--stone);font-weight:600}
.therm-label .count{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:var(--plum-dark)}
.therm-track{height:14px;background:var(--paper2);border-radius:8px;overflow:hidden}
.therm-fill{height:100%;background:linear-gradient(90deg,var(--periwinkle),var(--plum));border-radius:8px;transition:width .6s ease}
.therm-caption{font-size:12px;color:var(--stone);margin-top:8px;text-align:center}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = "https://iqxvqndfroegvhcipqkn.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sdBnR2sC_u8i6gFrydvcbA_8qBpTtbS";
const GOAL = 500;

async function supaFetch(path, options = {}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
      ...(options.headers || {}),
    },
  });
}

function Header({ eyebrow, title, sub }) {
  return (
    <header className="wrap">
      <div className="eyebrow">{eyebrow}</div>
      <h1>{title}</h1>
      {sub && <div className="sub">{sub}</div>}
    </header>
  );
}
function Footer() { return <footer>Nā Parikino Marae Reservation Trust</footer>; }

function Thermometer({ count }) {
  const pct = Math.min(100, Math.round((count / GOAL) * 100));
  return (
    <div className="wrap">
      <div className="therm-wrap">
        <div className="therm-label">
          <span className="goal">GOAL: {GOAL} WHĀNAU</span>
          <span className="count">{count === null ? "…" : count}</span>
        </div>
        <div className="therm-track"><div className="therm-fill" style={{ width: (count === null ? 0 : pct) + "%" }}></div></div>
        <div className="therm-caption">{count === null ? "Loading…" : `${pct}% of the way there — ngā mihi to everyone who's checked in.`}</div>
      </div>
    </div>
  );
}

function EmailGate({ onFound, onNotRegistered }) {
  const [email, setEmail] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  async function check() {
    if (!email.trim()) { setErr("Enter your email to continue."); return; }
    setBusy(true); setErr("");
    try {
      const res = await supaFetch("rpc/hc_check_member", {
        method: "POST",
        body: JSON.stringify({ p_email: email.trim().toLowerCase() }),
      });
      const data = await res.json();
      if (Array.isArray(data) && data.length > 0) {
        onFound({ id: data[0].id, name: data[0].name, email: email.trim().toLowerCase() });
      } else {
        onNotRegistered();
      }
    } catch (e) {
      setErr("Something went wrong — please try again.");
    }
    setBusy(false);
  }

  return (
    <div className="wrap">
      <div className="card">
        <label>Your email</label>
        <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" onKeyDown={e => e.key === "Enter" && check()} />
        {err && <div className="error">{err}</div>}
        <button className="btn" onClick={check} disabled={busy} style={{ marginTop: 14 }}>{busy ? "Checking…" : "Continue"}</button>
      </div>
    </div>
  );
}

function NotRegistered() {
  return (
    <div className="wrap">
      <div className="card thanks center">
        <div className="icon-circle">✋</div>
        <h2>Not registered yet</h2>
        <p style={{ marginBottom: 16 }}>We couldn't find that email on record. Register on the main Parikino Marae site first, then come back here.</p>
        <a href="/#register" style={{ color: "var(--plum)", fontWeight: 600, textDecoration: "none", borderBottom: "1.5px solid var(--periwinkle)" }}>Go to registration →</a>
      </div>
    </div>
  );
}

function Chips({ options, multi, value, onChange, otherValue, onOtherChange, hasOther }) {
  const selected = multi ? (value || []) : (value ? [value] : []);
  function toggle(opt) {
    if (multi) {
      onChange(selected.includes(opt) ? selected.filter(o => o !== opt) : [...selected, opt]);
    } else {
      onChange(opt);
    }
  }
  return (
    <div>
      <div className="choice-row">
        {options.map((opt, i) => (
          <button key={i} type="button" className={"chip" + (selected.includes(opt) ? " selected" : "")} onClick={() => toggle(opt)}>{opt}</button>
        ))}
        {hasOther && (
          <button type="button" className={"chip" + (selected.includes("Other") ? " selected" : "")} onClick={() => toggle("Other")}>Other</button>
        )}
      </div>
      {hasOther && selected.includes("Other") && (
        <input type="text" value={otherValue || ""} onChange={e => onOtherChange(e.target.value)} placeholder="Tell us more…" style={{ marginTop: 6 }} />
      )}
    </div>
  );
}

function PrivacyNote() {
  return (
    <div className="wrap">
      <div className="card" style={{ background: "var(--paper2)", fontSize: 13, color: "var(--stone)", lineHeight: 1.6 }}>
        <div style={{ fontWeight: 700, color: "var(--plum-dark)", marginBottom: 6 }}>🔒 Privacy</div>
        <p style={{ marginBottom: 8 }}>This check-in helps us plan future hui, wānanga, and support — and understand our whānau better.</p>
        <p style={{ marginBottom: 8 }}>We're collecting this to: help organise future hui, build our pool of whānau who can help out, and understand how to strengthen support, reo, and mahi together.</p>
        <p>Your answers are only seen by the organising team, never shared outside it, and you can ask us to update or delete your info anytime.</p>
      </div>
    </div>
  );
}

function CheckinForm({ member, onDone }) {
  const [a, setA] = useState({});
  const [otherRole, setOtherRole] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  function set(key, val) { setA(prev => ({ ...prev, [key]: val })); }

  async function submit() {
    const required = ["living_in_whanganui", "hui_interest", "wants_updates", "reo_confidence", "tikanga_familiarity", "age_bracket", "has_tamariki_at_home", "employment_status", "education_level", "housing_status", "vehicle_access", "internet_access", "accessibility_needs", "marae_visit_frequency"];
    const missing = required.filter(k => !a[k]);
    if (missing.length) { setErr("Please answer every question before sending — just a few more to go."); return; }

    setBusy(true); setErr("");
    let roles = (a.event_help_roles || []).filter(r => r !== "Other");
    if ((a.event_help_roles || []).includes("Other") && otherRole.trim()) roles.push(`Other: ${otherRole.trim()}`);

    try {
      const res = await supaFetch("hc_checkin_responses", {
        method: "POST",
        body: JSON.stringify({
          member_id: member.id,
          living_in_whanganui: a.living_in_whanganui,
          hui_interest: a.hui_interest,
          event_help_roles: roles.join(", ") || null,
          wants_updates: a.wants_updates,
          reo_confidence: a.reo_confidence,
          tikanga_familiarity: a.tikanga_familiarity,
          age_bracket: a.age_bracket,
          has_tamariki_at_home: a.has_tamariki_at_home,
          employment_status: a.employment_status,
          education_level: a.education_level,
          housing_status: a.housing_status,
          vehicle_access: a.vehicle_access,
          internet_access: a.internet_access,
          accessibility_needs: a.accessibility_needs,
          marae_visit_frequency: a.marae_visit_frequency,
        }),
      });
      if (!res.ok) throw new Error("save failed");
      onDone();
    } catch (e) {
      setErr("Couldn't send your answers — please try again.");
    }
    setBusy(false);
  }

  return (
    <div className="wrap">
      <div className="card">

        <div className="q">
          <label>Are you currently living in Whanganui?</label>
          <Chips options={["Yes", "No"]} value={a.living_in_whanganui} onChange={v => set("living_in_whanganui", v)} />
        </div>

        <div className="q">
          <label>If we held a hui (in person or online), would you be keen to join?</label>
          <Chips options={["Yes, in person", "Yes, by Zoom", "No"]} value={a.hui_interest} onChange={v => set("hui_interest", v)} />
        </div>

        <div className="q">
          <label>We're building a pool of whānau who can help out at marae events — which of these could we call on you for?</label>
          <Chips options={["Kai kōrero", "Kaikaranga", "Hall set-up", "Cooking/baking"]} multi value={a.event_help_roles} onChange={v => set("event_help_roles", v)} hasOther otherValue={otherRole} onOtherChange={setOtherRole} />
        </div>

        <div className="q">
          <label>Do you want to receive updates about upcoming wānanga or hui?</label>
          <Chips options={["Yes", "No"]} value={a.wants_updates} onChange={v => set("wants_updates", v)} />
        </div>

        <div className="q">
          <label>How confident are you with Te Reo Māori?</label>
          <Chips options={["Fluent", "Some understanding", "Learning", "None"]} value={a.reo_confidence} onChange={v => set("reo_confidence", v)} />
        </div>

        <div className="q">
          <label>Are you familiar with our tikanga?</label>
          <Chips options={["Yes, very familiar", "Somewhat familiar", "Still learning", "Not really"]} value={a.tikanga_familiarity} onChange={v => set("tikanga_familiarity", v)} />
        </div>

        <div className="q">
          <label>What age bracket are you in?</label>
          <Chips options={["Under 18", "18–24", "25–39", "40–59", "60+"]} value={a.age_bracket} onChange={v => set("age_bracket", v)} />
        </div>

        <div className="q">
          <label>Do you have tamariki at home?</label>
          <Chips options={["Yes", "No"]} value={a.has_tamariki_at_home} onChange={v => set("has_tamariki_at_home", v)} />
        </div>

        <div className="q">
          <label>Current employment situation</label>
          <Chips options={["Employed full-time", "Employed part-time", "Self-employed", "Studying", "Not currently working", "Retired"]} value={a.employment_status} onChange={v => set("employment_status", v)} />
        </div>

        <div className="q">
          <label>Highest level of education completed</label>
          <Chips options={["Secondary school", "Trade or vocational", "Undergraduate degree", "Postgraduate", "Other"]} value={a.education_level} onChange={v => set("education_level", v)} />
        </div>

        <div className="q">
          <label>Do you own your home, rent, or live with whānau?</label>
          <Chips options={["Own", "Renting", "Living with whānau", "Other"]} value={a.housing_status} onChange={v => set("housing_status", v)} />
        </div>

        <div className="q">
          <label>Do you have reliable access to a vehicle?</label>
          <Chips options={["Yes", "No", "Sometimes"]} value={a.vehicle_access} onChange={v => set("vehicle_access", v)} />
        </div>

        <div className="q">
          <label>Do you have reliable internet at home?</label>
          <Chips options={["Yes", "No", "Sometimes"]} value={a.internet_access} onChange={v => set("internet_access", v)} />
        </div>

        <div className="q">
          <label>Does anyone in your household have accessibility needs (mobility, vision, hearing etc.)?</label>
          <Chips options={["Yes", "No", "Prefer not to say"]} value={a.accessibility_needs} onChange={v => set("accessibility_needs", v)} />
        </div>

        <div className="q">
          <label>How often do you currently visit the marae?</label>
          <Chips options={["Regularly", "Occasionally", "Rarely", "Never been"]} value={a.marae_visit_frequency} onChange={v => set("marae_visit_frequency", v)} />
        </div>

        {err && <div className="error">{err}</div>}
        <button className="btn" onClick={submit} disabled={busy} style={{ marginTop: 8 }}>{busy ? "Sending…" : "Send my answers"}</button>
      </div>
    </div>
  );
}

function App() {
  const [stage, setStage] = useState("gate");
  const [member, setMember] = useState(null);
  const [count, setCount] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await supaFetch("rpc/hc_checkin_count", { method: "POST", body: "{}" });
        const data = await res.json();
        setCount(typeof data === "number" ? data : 0);
      } catch (e) { setCount(0); }
    })();
  }, [stage]);

  if (stage === "gate") {
    return (
      <React.Fragment>
        <Header eyebrow="Parikino Marae · Whānau Check-In" title="Let's reconnect" sub="A few quick questions to help us plan future kaupapa." />
        <Thermometer count={count} />
        <main>
          <EmailGate onFound={m => { setMember(m); setStage("form"); }} onNotRegistered={() => setStage("not-registered")} />
        </main>
        <Footer />
      </React.Fragment>
    );
  }

  if (stage === "not-registered") {
    return (
      <React.Fragment>
        <Header eyebrow="Parikino Marae · Whānau Check-In" title="Let's reconnect" />
        <main><NotRegistered /></main>
        <Footer />
      </React.Fragment>
    );
  }

  if (stage === "done") {
    return (
      <React.Fragment>
        <Header eyebrow="Parikino Marae · Whānau Check-In" title="Let's reconnect" />
        <Thermometer count={count} />
        <main>
          <div className="wrap">
            <div className="card thanks center">
              <div className="icon-circle">✓</div>
              <h2>Ngā mihi nui, {member.name.split(" ")[0]}</h2>
              <p>Your whakaaro matters — thank you for taking the time to reconnect with us.</p>
            </div>
          </div>
        </main>
        <Footer />
      </React.Fragment>
    );
  }

  return (
    <React.Fragment>
      <Header eyebrow="Parikino Marae · Whānau Check-In" title="Let's reconnect" sub="A few quick questions to help us plan future kaupapa." />
      <main>
        <PrivacyNote />
        <CheckinForm member={member} onDone={() => setStage("done")} />
      </main>
      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
